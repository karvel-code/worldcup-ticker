<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>FIFA World Cup 2026 – Live Updates</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --white:    #ffffff;
    --gold:     #f0c040;
    --red:      #cc0000;
    --card-bg:  #0f1c3a;
    --card-alt: #121f3d;
    --sep:      rgba(255,255,255,0.15);
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    font-family: 'Arial Black', Arial, sans-serif;
  }

  /* ── Screen ──────────────────────────────────────────────────────── */
  #screen {
    width: 100vw; height: 100vh;
    display: flex;
    flex-direction: column;
    background: #ffffff;
    position: relative;
    overflow: hidden;
  }

  /* ── Header ─────────────────────────────────────────────────────── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: clamp(10px,1.6vh,20px) clamp(28px,3.5vw,72px);
    flex-shrink: 0;
    position: relative;
    z-index: 5;
  }

  .header-brand {
    display: flex;
    align-items: center;
    gap: clamp(10px,1.4vw,22px);
  }

  .wc-logo {
    height: clamp(44px,7.5vh,86px);
    width: auto;
    object-fit: contain;
    filter: drop-shadow(0 2px 8px rgba(0,0,0,0.4));
  }

  .header-title {
    display: flex;
    flex-direction: column;
    gap: 1px;
    line-height: 1.1;
  }

  .ht-top {
    font-size: clamp(14px,2vw,30px);
    font-weight: 900;
    color: #0f1c3a;
    letter-spacing: 0.06em;
  }

  .ht-sub {
    font-size: clamp(9px,1.1vw,16px);
    font-weight: 700;
    color: #e8660e;
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }

  /* Right: BetHooray */
  .header-sponsor {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 3px;
  }

  .sponsor-by {
    font-size: clamp(9px,1vw,13px);
    font-weight: 700;
    color: #8090b8;
    letter-spacing: 0.18em;
    text-transform: uppercase;
  }

  .sponsor-logo {
    height: clamp(26px,4vh,52px);
    width: auto;
    object-fit: contain;
    filter: drop-shadow(0 1px 4px rgba(0,0,0,0.3));
  }

  /* ── State title ─────────────────────────────────────────────────── */
  #state-title {
    padding: clamp(4px,0.8vh,12px) clamp(28px,3.5vw,72px) clamp(2px,0.4vh,6px);
    font-size: clamp(28px,6.5vw,96px);
    font-weight: 900;
    font-style: italic;
    color: #0f1c3a;
    letter-spacing: 0.03em;
    line-height: 1;
    text-transform: uppercase;
    position: relative;
    z-index: 5;
    flex-shrink: 0;
    transition: opacity 0.3s;
  }

  #state-title.title-live { color: #cc0000; }

  /* Thin underline accent */
  #state-title::after {
    content: '';
    display: block;
    margin-top: clamp(4px,0.6vh,10px);
    height: 4px;
    width: clamp(60px,12vw,180px);
    background: #e8660e;
    border-radius: 2px;
  }

  /* ── Match list ──────────────────────────────────────────────────── */
  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: clamp(8px,1.2vh,20px) clamp(28px,3.5vw,72px);
    gap: 0;
    overflow: hidden;
    position: relative;
    z-index: 5;
    transition: opacity 0.4s;
  }

  #main.fading { opacity: 0; }

  /* Two-column grid when there are enough rows */
  .rows-wrap {
    display: grid;
    grid-template-columns: 1fr;
    gap: clamp(6px,1vh,12px);
    width: 100%;
  }

  /* ── Match row (dark navy card, matches ticker style) ───────────── */
  .match-row {
    display: flex;
    align-items: center;
    padding: clamp(8px,1.3vh,22px) clamp(12px,1.8vw,32px);
    background: var(--card-bg);
    border-radius: 10px;
    gap: clamp(8px,1.2vw,20px);
  }

  .match-row:nth-child(even) { background: var(--card-alt); }

  /* Status pill */
  .row-status {
    min-width: clamp(40px,6vw,90px);
    text-align: center;
    font-size: clamp(10px,1.2vw,16px);
    font-weight: 800;
    letter-spacing: 0.06em;
    padding: 3px 8px;
    border-radius: 4px;
    flex-shrink: 0;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
  }

  .status-live     { background: var(--red); color: #fff; }
  .status-ft       { background: rgba(255,255,255,0.2); color: rgba(255,255,255,0.8); }
  .status-upcoming { background: rgba(255,255,255,0.15); color: var(--gold); }

  .live-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #fff;
    display: inline-block;
    animation: pulse 1.1s ease-in-out infinite;
    flex-shrink: 0;
  }

  @keyframes pulse {
    0%,100% { opacity: 1; }
    50%      { opacity: 0.25; }
  }

  /* Team (home/away) */
  .team-home,
  .team-away {
    display: flex;
    align-items: center;
    gap: clamp(6px,0.8vw,14px);
    flex: 1;
  }

  .team-home { justify-content: flex-end; text-align: right; }
  .team-away { justify-content: flex-start; text-align: left; }

  .team-flag { font-size: clamp(22px,3.5vw,48px); line-height: 1; flex-shrink: 0; }

  .team-name {
    font-size: clamp(14px,2.2vw,32px);
    font-weight: 900;
    color: var(--white);
    letter-spacing: 0.04em;
    white-space: nowrap;
    text-transform: uppercase;
  }

  /* Score / VS */
  .score-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-width: clamp(70px,8vw,140px);
    flex-shrink: 0;
  }

  .score {
    font-size: clamp(22px,4vw,58px);
    font-weight: 900;
    color: var(--white);
    letter-spacing: -0.02em;
    line-height: 1;
  }

  .score-vs {
    font-size: clamp(16px,2.8vw,40px);
    font-weight: 900;
    color: rgba(255,255,255,0.5);
  }

  /* Group / venue */
  .row-meta {
    font-size: clamp(9px,1.1vw,14px);
    color: rgba(255,255,255,0.55);
    font-weight: 700;
    letter-spacing: 0.06em;
    white-space: nowrap;
    text-align: right;
    min-width: clamp(60px,10vw,180px);
    flex-shrink: 0;
    font-family: Arial, sans-serif;
    font-style: normal;
    font-weight: 600;
  }

  /* ── Footer ─────────────────────────────────────────────────────── */
  footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: clamp(8px,1.2vh,16px) clamp(28px,3.5vw,72px);
    border-top: 1px solid rgba(15,28,58,0.15);
    flex-shrink: 0;
    position: relative;
    z-index: 5;
  }

  .footer-hosts {
    font-size: clamp(10px,1.1vw,15px);
    font-weight: 700;
    color: rgba(15,28,58,0.45);
    letter-spacing: 0.08em;
  }

  .footer-url {
    font-size: clamp(13px,1.6vw,22px);
    font-weight: 900;
    color: #e8660e;
    letter-spacing: 0.04em;
  }

  /* ── Fallback ───────────────────────────────────────────────────── */
  .fallback {
    font-size: clamp(24px,4vw,56px);
    font-weight: 900;
    color: rgba(15,28,58,0.25);
    text-align: center;
    padding: 40px;
  }

  /* ── Full-screen BetHooray sponsor overlay ───────────────────────── */
  #sponsor-overlay {
    position: fixed;
    inset: 0;
    z-index: 200;
    background: #ffffff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: clamp(14px,3vh,36px);
    transform: translateY(100%);
    pointer-events: none;
  }

  #sponsor-overlay.ov-in {
    animation: ovIn 0.55s cubic-bezier(0.22,1,0.36,1) forwards;
  }
  #sponsor-overlay.ov-out {
    animation: ovOut 0.5s ease-in forwards;
  }

  @keyframes ovIn  { from { transform: translateY(100%); } to { transform: translateY(0); } }
  @keyframes ovOut { from { transform: translateY(0);    } to { transform: translateY(-100%); } }

  .ov-by {
    font-size: clamp(14px,2.5vh,28px);
    font-weight: 700;
    color: #aaa;
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }

  .ov-logo {
    width: clamp(280px,40vw,700px);
    height: auto;
    max-height: 35vh;
    object-fit: contain;
  }

  .ov-url {
    font-size: clamp(18px,3.5vh,44px);
    font-weight: 900;
    color: #e8660e;
    letter-spacing: 0.04em;
  }

  /* ── Portrait sponsor strip (between title and rows) ────────────── */
  #portrait-sponsor {
    display: none; /* hidden in landscape */
  }

  /* ── Portrait overrides ─────────────────────────────────────────── */
  @media (orientation: portrait) {
    #state-title {
      font-size: clamp(32px,9vw,80px);
      padding-bottom: clamp(6px,1.2vw,14px);
    }

    /* Minimal vertical padding — cards have their own gap */
    #main {
      justify-content: flex-start;
      padding-top: clamp(4px,0.8vw,10px);
      padding-bottom: clamp(4px,0.8vw,10px);
    }

    /* Switch rows-wrap to flex column so rows stretch to fill all of #main */
    .rows-wrap {
      display: flex !important;
      flex-direction: column;
      flex: 1;
      height: 100%;
      grid-template-columns: unset;
    }

    /* Each row expands equally — no dead zone at bottom */
    .match-row {
      flex: 1;
      min-height: 0;
    }

    .team-name   { font-size: clamp(13px,4.5vw,28px); }
    .score       { font-size: clamp(20px,6.5vw,50px); }
    .score-vs    { font-size: clamp(16px,5vw,36px); }
    .team-flag   { font-size: clamp(24px,7vw,48px); }
    .row-meta    { display: none; }

    .header-title .ht-top { font-size: clamp(13px,4vw,28px); }
    .header-title .ht-sub { font-size: clamp(9px,2.5vw,14px); }
    .wc-logo               { height: clamp(40px,8vw,70px); }

    /* Show the sponsor strip only in portrait */
    #portrait-sponsor {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      padding: clamp(10px,2vw,20px) clamp(28px,3.5vw,72px);
      background: #0f1c3a;
      border-top: 1px solid rgba(255,255,255,0.08);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      gap: clamp(12px,3vw,28px);
      position: relative;
      z-index: 5;
    }

    .ps-label {
      font-size: clamp(10px,2.2vw,15px);
      font-weight: 700;
      color: rgba(255,255,255,0.55);
      letter-spacing: 0.16em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .ps-pill {
      display: flex;
      align-items: center;
      background: rgba(255,255,255,0.95);
      border-radius: 50px;
      padding: clamp(5px,1.2vw,10px) clamp(14px,3vw,26px);
      box-shadow: 0 2px 16px rgba(0,0,0,0.25);
    }

    .ps-logo {
      height: clamp(28px,6.5vw,52px);
      width: auto;
    }

    .ps-url {
      font-size: clamp(13px,3.2vw,24px);
      font-weight: 900;
      color: rgba(255,255,255,0.75);
      letter-spacing: 0.02em;
      white-space: nowrap;
    }
  }

  /* Landscape: 2-col match grid when 5+ matches */
  @media (orientation: landscape) {
    .rows-wrap.two-col {
      grid-template-columns: 1fr 1fr;
      column-gap: clamp(16px,2vw,40px);
    }
  }
</style>
</head>
<body>
<div id="screen">

  <header>
    <div class="header-brand">
      <img class="wc-logo" src="../ticker/wc2026-logo.png" alt="FIFA World Cup 2026">
      <div class="header-title">
        <span class="ht-top">FIFA WORLD CUP</span>
        <span class="ht-sub">USA &nbsp;·&nbsp; Canada &nbsp;·&nbsp; Mexico</span>
      </div>
    </div>
    <div class="header-sponsor">
      <span class="sponsor-by">Sponsored by</span>
      <img class="sponsor-logo" src="" data-logo="bh" alt="BetHooray">
    </div>
  </header>

  <div id="state-title">UPCOMING FIXTURES</div>

  <!-- Portrait-only sponsor strip — hidden in landscape via CSS -->
  <div id="portrait-sponsor">
    <span class="ps-label">Sponsored by</span>
    <div class="ps-pill">
      <img class="ps-logo" src="" data-logo="bh" alt="BetHooray">
    </div>
    <span class="ps-url">www.bethooray.com</span>
  </div>

  <main id="main">
    <div class="fallback">🏆 FIFA World Cup 2026</div>
  </main>

  <footer>
    <div class="footer-hosts">🇺🇸 USA &nbsp;·&nbsp; 🇨🇦 Canada &nbsp;·&nbsp; 🇲🇽 Mexico</div>
    <div class="footer-url">www.bethooray.com</div>
  </footer>

</div>

<!-- Full-screen BetHooray overlay -->
<div id="sponsor-overlay">
  <div class="ov-by">Sponsored by</div>
  <img class="ov-logo" src="" data-logo="bh" alt="BetHooray">
  <div class="ov-url">www.bethooray.com</div>
</div>

<script>
  const API_URL = (location.hostname === '127.0.0.1' || location.hostname === 'localhost')
    ? 'http://localhost:3000/api/scores'
    : '/api/scores';

  const FETCH_INTERVAL_MS  = 20_000;
  const STATE_DURATION_MS  = 30_000;
  const SPONSOR_DURATION_MS = 6_000;
  const EAT = 'Africa/Nairobi';

  let currentData = null;
  let cycleState  = 'upcoming';
  let stateTimer  = null;

  const FLAGS = {
    'Argentina':    '🇦🇷', 'Australia':       '🇦🇺', 'Belgium':      '🇧🇪',
    'Brazil':       '🇧🇷', 'Cameroon':        '🇨🇲', 'Canada':       '🇨🇦',
    'Chile':        '🇨🇱', 'Colombia':        '🇨🇴', 'Costa Rica':   '🇨🇷',
    'Croatia':      '🇭🇷', 'Denmark':         '🇩🇰', 'Ecuador':      '🇪🇨',
    'Egypt':        '🇪🇬', 'England':         '🏴󠁧󠁢󠁥󠁮󠁧󠁿', 'France':       '🇫🇷',
    'Germany':      '🇩🇪', 'Ghana':           '🇬🇭', 'Honduras':     '🇭🇳',
    'Iran':         '🇮🇷', 'Japan':           '🇯🇵', 'Mexico':       '🇲🇽',
    'Morocco':      '🇲🇦', 'Netherlands':     '🇳🇱', 'New Zealand':  '🇳🇿',
    'Nigeria':      '🇳🇬', 'Panama':          '🇵🇦', 'Paraguay':     '🇵🇾',
    'Peru':         '🇵🇪', 'Poland':          '🇵🇱', 'Portugal':     '🇵🇹',
    'Qatar':        '🇶🇦', 'Saudi Arabia':    '🇸🇦', 'Senegal':      '🇸🇳',
    'Serbia':       '🇷🇸', 'South Korea':     '🇰🇷', 'Spain':        '🇪🇸',
    'Switzerland':  '🇨🇭', 'Tunisia':         '🇹🇳', 'United States':'🇺🇸',
    'Uruguay':      '🇺🇾', 'Wales':           '🏴󠁧󠁢󠁷󠁬󠁳󠁿', 'South Africa': '🇿🇦',
    'USA':          '🇺🇸', 'Korea Republic':  '🇰🇷', 'IR Iran':      '🇮🇷',
    'Czechia':      '🇨🇿', 'Czech Republic':  '🇨🇿', 'Scotland':     '🏴󠁧󠁢󠁳󠁣󠁴󠁿',
    "Côte d'Ivoire":'🇨🇮', 'Ivory Coast':     '🇨🇮', 'Slovenia':     '🇸🇮',
    'Slovakia':     '🇸🇰', 'Albania':         '🇦🇱', 'Romania':      '🇷🇴',
    'Austria':      '🇦🇹', 'Turkey':          '🇹🇷', 'Georgia':      '🇬🇪',
    'Ukraine':      '🇺🇦', 'Hungary':         '🇭🇺', 'Bolivia':      '🇧🇴',
    'Venezuela':    '🇻🇪', 'Guatemala':       '🇬🇹', 'El Salvador':  '🇸🇻',
    'Jamaica':      '🇯🇲', 'Indonesia':       '🇮🇩', 'Uzbekistan':   '🇺🇿',
    'Jordan':       '🇯🇴', 'Iraq':            '🇮🇶', 'Algeria':      '🇩🇿',
    'Mali':         '🇲🇱', 'Burkina Faso':    '🇧🇫', 'Congo DR':     '🇨🇩',
    'Tanzania':     '🇹🇿', 'Zambia':          '🇿🇲', 'Guinea':       '🇬🇳',
    'Cape Verde':   '🇨🇻', 'Sweden':          '🇸🇪',
    'United States of America': '🇺🇸',
  };

  function flag(n) { return FLAGS[n] || ''; }

  function abbrev(m, side) {
    const ab   = side === 'home' ? m.home_abbrev : m.away_abbrev;
    const name = side === 'home' ? m.home        : m.away;
    return (ab && ab.length > 0) ? ab : name.slice(0, 3).toUpperCase();
  }

  function teamName(m, side) {
    return side === 'home' ? (m.home || '') : (m.away || '');
  }

  function matchTime(utcDate) {
    return new Date(utcDate).toLocaleTimeString([], {
      hour: '2-digit', minute: '2-digit', timeZone: EAT
    });
  }

  function matchDayLabel(utcDate) {
    const d   = new Date(utcDate);
    const now = new Date();
    const fmt = { timeZone: EAT, year: 'numeric', month: '2-digit', day: '2-digit' };
    const matchDay    = d.toLocaleDateString('en-CA', fmt);
    const todayDay    = now.toLocaleDateString('en-CA', fmt);
    const tomorrowDay = new Date(now.getTime() + 864e5).toLocaleDateString('en-CA', fmt);
    if (matchDay === todayDay)    return 'Today';
    if (matchDay === tomorrowDay) return 'Tomorrow';
    return d.toLocaleDateString([], { month: 'short', day: 'numeric', timeZone: EAT });
  }

  function metaStr(m) {
    return [m.group, m.venue_city].filter(Boolean).join(' · ');
  }

  function buildRow(m, mode) {
    let statusHtml, scoreHtml;

    if (mode === 'live') {
      const min = m.status === 'PAUSED' ? 'HT' : (m.minute ? m.minute + "'" : 'LIVE');
      const dot = m.status === 'PAUSED' ? '' : '<span class="live-dot"></span>';
      statusHtml = `<div class="row-status status-live">${dot}${min}</div>`;
      scoreHtml  = `<div class="score-col"><span class="score">${m.home_score??0}–${m.away_score??0}</span></div>`;
    } else if (mode === 'recent') {
      statusHtml = `<div class="row-status status-ft">FT</div>`;
      scoreHtml  = `<div class="score-col"><span class="score">${m.home_score??0}–${m.away_score??0}</span></div>`;
    } else {
      const t = `${matchDayLabel(m.utc_date)} ${matchTime(m.utc_date)}`;
      statusHtml = `<div class="row-status status-upcoming">${t}</div>`;
      scoreHtml  = `<div class="score-col"><span class="score-vs">VS</span></div>`;
    }

    return `<div class="match-row">
      ${statusHtml}
      <div class="team-home">
        <span class="team-name">${teamName(m,'home')}</span>
        <span class="team-flag">${flag(m.home)}</span>
      </div>
      ${scoreHtml}
      <div class="team-away">
        <span class="team-flag">${flag(m.away)}</span>
        <span class="team-name">${teamName(m,'away')}</span>
      </div>
      <div class="row-meta">${metaStr(m)}</div>
    </div>`;
  }

  const stateTitleEl  = document.getElementById('state-title');
  const mainEl        = document.getElementById('main');
  const sponsorOverlay = document.getElementById('sponsor-overlay');

  function setTitle(mode) {
    stateTitleEl.className = mode === 'live' ? 'title-live' : '';
    stateTitleEl.textContent =
      mode === 'live'   ? '● Live Scores'      :
      mode === 'recent' ? 'Match Results'       : 'Upcoming Fixtures';
  }

  function render(mode, data) {
    setTitle(mode);
    const items = mode === 'live'   ? (data.live     || []) :
                  mode === 'recent' ? (data.recent   || []) :
                                      (data.upcoming || []);

    if (!items.length) {
      mainEl.innerHTML = '<div class="fallback">🏆 FIFA World Cup 2026</div>';
      return;
    }

    // Use 2-col grid in landscape if 5+ matches
    const twoCol = window.matchMedia('(orientation: landscape)').matches && items.length >= 5;
    const rows   = items.map(m => buildRow(m, mode)).join('');
    mainEl.innerHTML = `<div class="rows-wrap${twoCol ? ' two-col' : ''}">${rows}</div>`;
  }

  // ── Sponsor overlay logic ─────────────────────────────────────────
  // Each state is preceded by a full-screen BetHooray takeover.
  // Flow: ovIn → (SPONSOR_DURATION_MS) → render new state → ovOut → (STATE_DURATION_MS) → next

  function showSponsorThen(renderFn) {
    // slide in
    sponsorOverlay.classList.remove('ov-out');
    sponsorOverlay.classList.add('ov-in');

    setTimeout(() => {
      // render new state behind the overlay
      renderFn();

      // slide out (exits upward, reveals new state)
      sponsorOverlay.classList.remove('ov-in');
      sponsorOverlay.classList.add('ov-out');
    }, SPONSOR_DURATION_MS);
  }

  function scheduleNext() {
    clearTimeout(stateTimer);
    stateTimer = setTimeout(() => {
      if (!currentData) return;
      const hasRecent   = currentData.recent?.length   > 0;
      const hasUpcoming = currentData.upcoming?.length > 0;
      // Only cycle if both states exist
      if (hasRecent && hasUpcoming) {
        cycleState = cycleState === 'upcoming' ? 'recent' : 'upcoming';
        showSponsorThen(() => {
          render(cycleState, currentData);
          scheduleNext();
        });
      } else {
        scheduleNext(); // re-check after another interval
      }
    }, STATE_DURATION_MS);
  }

  // ── Main display logic ───────────────────────────────────────────
  let prevMode = null;

  function display(data) {
    const wasLive     = prevMode === 'live';
    currentData       = data;
    const hasLive     = data.live?.length     > 0;
    const hasRecent   = data.recent?.length   > 0;
    const hasUpcoming = data.upcoming?.length > 0;

    let newMode;
    if      (hasLive)     newMode = 'live';
    else if (hasRecent)   newMode = 'recent';
    else if (hasUpcoming) newMode = 'upcoming';
    else                  newMode = 'upcoming';

    if (hasLive) {
      if (prevMode !== 'live') {
        // Transitioning INTO live: show sponsor first
        clearTimeout(stateTimer);
        showSponsorThen(() => render('live', data));
      } else {
        // Already live: just refresh the scores in-place
        render('live', data);
      }
    } else if (prevMode === 'live' || prevMode === null) {
      // Coming out of live (or first load): sponsor then start cycle
      clearTimeout(stateTimer);
      cycleState = hasUpcoming ? 'upcoming' : (hasRecent ? 'recent' : 'upcoming');
      showSponsorThen(() => {
        render(cycleState, data);
        if (hasRecent && hasUpcoming) scheduleNext();
      });
    } else {
      // Non-live refresh: update currentData but don't interrupt the cycle
      // (scheduleNext handles cycling; just silently update)
    }

    prevMode = newMode;
  }
