<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>FIFA World Cup 2026 – Live Updates</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --navy:       #0a1628;
    --navy-mid:   #14253f;
    --navy-light: #1e3358;
    --red:        #cc0000;
    --gold:       #c8a430;
    --white:      #ffffff;
    --card-bg:    rgba(255,255,255,0.97);
    --text-dark:  #0a1628;
    --text-mid:   #3a4a6a;
    --text-muted: #6878a0;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--navy);
    font-family: 'Arial Black', Arial, sans-serif;
  }

  /* ── Screen wrapper ─────────────────────────────────────────────── */
  #screen {
    width: 100vw; height: 100vh;
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
  }

  /* Diagonal accent strip behind header */
  #screen::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 5px;
    background: linear-gradient(90deg, var(--red) 0%, var(--gold) 50%, var(--red) 100%);
    z-index: 10;
  }

  /* ── Header ─────────────────────────────────────────────────────── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: clamp(10px,1.8vh,22px) clamp(24px,3vw,64px);
    background: var(--navy-mid);
    border-bottom: 2px solid rgba(255,255,255,0.08);
    flex-shrink: 0;
    gap: 16px;
    z-index: 5;
  }

  /* Left: logo + title */
  .header-brand {
    display: flex;
    align-items: center;
    gap: clamp(10px,1.4vw,22px);
  }

  .wc-logo {
    height: clamp(50px,8vh,96px);
    width: auto;
    object-fit: contain;
  }

  .header-title {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .header-title-top {
    font-size: clamp(15px,2.2vw,32px);
    font-weight: 900;
    color: var(--white);
    letter-spacing: 0.06em;
    line-height: 1;
  }

  .header-title-sub {
    font-size: clamp(10px,1.2vw,17px);
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 0.18em;
    text-transform: uppercase;
  }

  /* Centre: state badge */
  #state-badge {
    font-size: clamp(16px,2.6vw,38px);
    font-weight: 900;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: clamp(6px,1vh,14px) clamp(18px,2.4vw,42px);
    border-radius: 6px;
    color: var(--white);
    white-space: nowrap;
    transition: background 0.4s;
  }

  #state-badge.live     { background: var(--red); }
  #state-badge.recent   { background: var(--navy-light); border: 2px solid var(--gold); }
  #state-badge.upcoming { background: var(--navy-light); border: 2px solid rgba(255,255,255,0.2); }

  /* Right: BetHooray sponsor */
  .header-sponsor {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 3px;
  }

  .sponsor-by {
    font-size: clamp(9px,1vw,13px);
    font-weight: 700;
    color: rgba(255,255,255,0.45);
    letter-spacing: 0.16em;
    text-transform: uppercase;
  }

  .sponsor-logo {
    height: clamp(30px,4.5vh,58px);
    width: auto;
    object-fit: contain;
  }

  /* ── Main cards area ─────────────────────────────────────────────── */
  main {
    flex: 1;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(clamp(260px,22vw,420px), 1fr));
    gap: clamp(12px,1.8vh,28px) clamp(12px,1.6vw,28px);
    padding: clamp(16px,2.4vh,40px) clamp(24px,3vw,64px);
    align-content: center;
    overflow: hidden;
    transition: opacity 0.4s;
  }

  main.fading { opacity: 0; }

  /* ── Match card ──────────────────────────────────────────────────── */
  .match-card {
    background: var(--card-bg);
    border-radius: 14px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: clamp(6px,1vh,14px);
    padding: clamp(14px,2vh,28px) clamp(16px,2vw,32px);
    position: relative;
    overflow: hidden;
    box-shadow: 0 4px 24px rgba(0,0,0,0.35);
  }

  /* Coloured top accent per card type */
  .match-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 5px;
  }
  .card-live::before     { background: var(--red); }
  .card-recent::before   { background: var(--gold); }
  .card-upcoming::before { background: #3a6abf; }

  /* Status line */
  .card-status {
    font-size: clamp(10px,1.2vw,15px);
    font-weight: 800;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .card-live    .card-status { color: var(--red); }
  .card-recent  .card-status { color: #7a6010; }
  .card-upcoming .card-status { color: #3a6abf; }

  /* Pulsing live dot */
  .live-dot {
    width: 9px; height: 9px;
    border-radius: 50%;
    background: var(--red);
    display: inline-block;
    animation: pulse 1.1s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%       { opacity: 0.35; transform: scale(0.8); }
  }

  /* Teams row */
  .card-teams {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: clamp(8px,1.2vw,20px);
    width: 100%;
  }

  .team-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    flex: 1;
  }

  .team-flag { font-size: clamp(30px,4.5vw,58px); line-height: 1; }
  .team-name {
    font-size: clamp(12px,1.6vw,22px);
    font-weight: 900;
    color: var(--text-dark);
    text-align: center;
  }

  /* Score / VS */
  .score-block {
    display: flex;
    align-items: center;
    justify-content: center;
    min-width: clamp(60px,6vw,100px);
  }

  .score {
    font-size: clamp(28px,4.5vw,62px);
    font-weight: 900;
    color: var(--text-dark);
    line-height: 1;
    letter-spacing: -0.02em;
  }

  .score-vs {
    font-size: clamp(16px,2.4vw,34px);
    font-weight: 900;
    color: #aab0c4;
  }

  /* Meta (group · venue) */
  .card-meta {
    font-size: clamp(9px,1.1vw,14px);
    font-weight: 700;
    color: var(--text-muted);
    text-align: center;
    letter-spacing: 0.04em;
    font-family: Arial, sans-serif;
    font-style: normal;
    font-weight: 600;
  }

  /* ── Footer ─────────────────────────────────────────────────────── */
  footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: clamp(8px,1.4vh,18px) clamp(24px,3vw,64px);
    background: var(--navy-mid);
    border-top: 2px solid rgba(255,255,255,0.08);
    flex-shrink: 0;
  }

  .footer-hosts {
    font-size: clamp(10px,1.2vw,16px);
    font-weight: 700;
    color: rgba(255,255,255,0.35);
    letter-spacing: 0.08em;
  }

  .footer-url {
    font-size: clamp(14px,1.8vw,26px);
    font-weight: 900;
    color: #e8660e;
    letter-spacing: 0.04em;
  }

  .footer-powered {
    font-size: clamp(10px,1.2vw,16px);
    font-weight: 600;
    color: rgba(255,255,255,0.35);
    letter-spacing: 0.06em;
    font-family: Arial, sans-serif;
  }

  /* ── Fallback ───────────────────────────────────────────────────── */
  .fallback-wrap {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .fallback {
    font-size: clamp(28px,4vw,56px);
    font-weight: 900;
    color: rgba(255,255,255,0.2);
    text-align: center;
  }

  /* ── Portrait overrides ─────────────────────────────────────────── */
  @media (orientation: portrait) {
    header { flex-wrap: wrap; }

    #state-badge {
      width: 100%;
      text-align: center;
      font-size: clamp(20px,5vw,44px);
      order: 3;
    }

    .header-sponsor { order: 2; }

    main {
      grid-template-columns: repeat(2, 1fr);
      align-content: start;
    }

    .team-flag { font-size: clamp(28px,7vw,52px); }
    .score     { font-size: clamp(26px,8vw,56px); }
    .team-name { font-size: clamp(11px,3.5vw,20px); }
  }
</style>
</head>
<body>
<div id="screen">

  <header>
    <div class="header-brand">
      <img class="wc-logo" src="../ticker/wc2026-logo.png" alt="FIFA World Cup 2026">
      <div class="header-title">
        <span class="header-title-top">FIFA WORLD CUP</span>
        <span class="header-title-sub">USA &nbsp;·&nbsp; Canada &nbsp;·&nbsp; Mexico</span>
      </div>
    </div>

    <div id="state-badge" class="upcoming">UPCOMING FIXTURES</div>

    <div class="header-sponsor">
      <span class="sponsor-by">Sponsored by</span>
      <img class="sponsor-logo" src="../ticker/bethooray-logo.png" alt="BetHooray">
    </div>
  </header>

  <main id="main">
    <div class="fallback-wrap"><div class="fallback">🏆 FIFA World Cup 2026</div></div>
  </main>

  <footer>
    <div class="footer-hosts">🇺🇸 USA &nbsp;·&nbsp; 🇨🇦 Canada &nbsp;·&nbsp; 🇲🇽 Mexico</div>
    <div class="footer-url">www.bethooray.com</div>
    <div class="footer-powered">Live World Cup Updates</div>
  </footer>

</div>
<script>
  const API_URL = (location.hostname === '127.0.0.1' || location.hostname === 'localhost')
    ? 'http://localhost:3000/api/scores'
    : '/api/scores';

  const FETCH_INTERVAL_MS = 20_000;
  const CYCLE_INTERVAL_MS = 30_000;
  const EAT = 'Africa/Nairobi';

  let currentData = null;
  let cycleState  = 'upcoming';
  let cycleTimer  = null;

  const FLAGS = {
    'Argentina':    '🇦🇷', 'Australia':       '🇦🇺', 'Belgium':      '🇧🇪',
    'Brazil':       '🇧🇷', 'Cameroon':        '🇨🇲', 'Canada':       '🇨🇦',
    'Chile':        '🇨🇱', 'Colombia':        '🇨🇴', 'Costa Rica':   '🇨🇷',
    'Croatia':      '🇭🇷', 'Denmark':         '🇩🇰', 'Ecuador':      '🇪🇨',
    'Egypt':        '🇪🇬', 'England':         '🏴󠁧󠁢󠁥󠁮󠁧󠁿', 'France':       '🇫🇷',
    'Germany':      '🇩🇪', 'Ghana':           '🇬🇭', 'Honduras':     '🇭🇳',
    'Iran':         '🇮🇷', 'Japan':           '🇯🇵', 'Mexico':       '🇲🇽',
    'Morocco':      '🇲🇦', 'Netherlands':     '🇳🇱', 'New Zealand':  '🇳🇿',
    'Nigeria':      '🇳🇬', 'Panama':          '🇵🇦', 'Paraguay':     '🇵🇾',
    'Peru':         '🇵🇪', 'Poland':          '🇵🇱', 'Portugal':     '🇵🇹',
    'Qatar':        '🇶🇦', 'Saudi Arabia':    '🇸🇦', 'Senegal':      '🇸🇳',
    'Serbia':       '🇷🇸', 'South Korea':     '🇰🇷', 'Spain':        '🇪🇸',
    'Switzerland':  '🇨🇭', 'Tunisia':         '🇹🇳', 'United States':'🇺🇸',
    'Uruguay':      '🇺🇾', 'Wales':           '🏴󠁧󠁢󠁷󠁬󠁳󠁿', 'South Africa': '🇿🇦',
    'USA':          '🇺🇸', 'Korea Republic':  '🇰🇷', 'IR Iran':      '🇮🇷',
    'Czechia':      '🇨🇿', 'Czech Republic':  '🇨🇿', 'Scotland':     '🏴󠁧󠁢󠁳󠁣󠁴󠁿',
    "Côte d'Ivoire":'🇨🇮', 'Ivory Coast':     '🇨🇮', 'Slovenia':     '🇸🇮',
    'Slovakia':     '🇸🇰', 'Albania':         '🇦🇱', 'Romania':      '🇷🇴',
    'Austria':      '🇦🇹', 'Turkey':          '🇹🇷', 'Georgia':      '🇬🇪',
    'Ukraine':      '🇺🇦', 'Hungary':         '🇭🇺', 'Bolivia':      '🇧🇴',
    'Venezuela':    '🇻🇪', 'Guatemala':       '🇬🇹', 'El Salvador':  '🇸🇻',
    'Jamaica':      '🇯🇲', 'Indonesia':       '🇮🇩', 'Uzbekistan':   '🇺🇿',
    'Jordan':       '🇯🇴', 'Iraq':            '🇮🇶', 'Algeria':      '🇩🇿',
    'Mali':         '🇲🇱', 'Burkina Faso':    '🇧🇫', 'Congo DR':     '🇨🇩',
    'Tanzania':     '🇹🇿', 'Zambia':          '🇿🇲', 'Guinea':       '🇬🇳',
    'Cape Verde':   '🇨🇻', 'Sweden':          '🇸🇪',
    'United States of America': '🇺🇸',
  };

  function flag(n) { return FLAGS[n] || ''; }

  function abbrev(m, side) {
    const ab   = side === 'home' ? m.home_abbrev : m.away_abbrev;
    const name = side === 'home' ? m.home        : m.away;
    return (ab && ab.length > 0) ? ab : name.slice(0, 3).toUpperCase();
  }

  function matchTime(utcDate) {
    return new Date(utcDate).toLocaleTimeString([], {
      hour: '2-digit', minute: '2-digit', timeZone: EAT
    });
  }

  function matchDayLabel(utcDate) {
    const d   = new Date(utcDate);
    const now = new Date();
    const fmt = { timeZone: EAT, year: 'numeric', month: '2-digit', day: '2-digit' };
    const matchDay    = d.toLocaleDateString('en-CA', fmt);
    const todayDay    = now.toLocaleDateString('en-CA', fmt);
    const tomorrowDay = new Date(now.getTime() + 864e5).toLocaleDateString('en-CA', fmt);
    if (matchDay === todayDay)    return 'Today';
    if (matchDay === tomorrowDay) return 'Tomorrow';
    return d.toLocaleDateString([], { month: 'short', day: 'numeric', timeZone: EAT });
  }

  function meta(m) {
    return [m.group, m.venue_city].filter(Boolean).join(' · ');
  }

  function buildLiveCard(m) {
    const min = m.status === 'PAUSED' ? 'HT' : (m.minute ? m.minute + "'" : 'LIVE');
    const dot = m.status === 'PAUSED' ? '' : '<span class="live-dot"></span>';
    return `<div class="match-card card-live">
      <div class="card-status">${dot}${min}</div>
      <div class="card-teams">
        <div class="team-block">
          <span class="team-flag">${flag(m.home)}</span>
          <span class="team-name">${abbrev(m,'home')}</span>
        </div>
        <div class="score-block"><span class="score">${m.home_score??0}–${m.away_score??0}</span></div>
        <div class="team-block">
          <span class="team-flag">${flag(m.away)}</span>
          <span class="team-name">${abbrev(m,'away')}</span>
        </div>
      </div>
      <div class="card-meta">${meta(m)}</div>
    </div>`;
  }

  function buildRecentCard(m) {
    return `<div class="match-card card-recent">
      <div class="card-status">FULL TIME</div>
      <div class="card-teams">
        <div class="team-block">
          <span class="team-flag">${flag(m.home)}</span>
          <span class="team-name">${abbrev(m,'home')}</span>
        </div>
        <div class="score-block"><span class="score">${m.home_score??0}–${m.away_score??0}</span></div>
        <div class="team-block">
          <span class="team-flag">${flag(m.away)}</span>
          <span class="team-name">${abbrev(m,'away')}</span>
        </div>
      </div>
      <div class="card-meta">${meta(m)}</div>
    </div>`;
  }

  function buildUpcomingCard(m) {
    const timeLabel = `${matchDayLabel(m.utc_date)} · ${matchTime(m.utc_date)}`;
    return `<div class="match-card card-upcoming">
      <div class="card-status">${timeLabel}</div>
      <div class="card-teams">
        <div class="team-block">
          <span class="team-flag">${flag(m.home)}</span>
          <span class="team-name">${abbrev(m,'home')}</span>
        </div>
        <div class="score-block"><span class="score-vs">VS</span></div>
        <div class="team-block">
          <span class="team-flag">${flag(m.away)}</span>
          <span class="team-name">${abbrev(m,'away')}</span>
        </div>
      </div>
      <div class="card-meta">${meta(m)}</div>
    </div>`;
  }

  const stateBadge = document.getElementById('state-badge');
  const mainEl     = document.getElementById('main');

  function setbadge(mode) {
    stateBadge.className = mode;
    stateBadge.textContent =
      mode === 'live'   ? '● LIVE SCORES'       :
      mode === 'recent' ? 'MATCH RESULTS'        : 'UPCOMING FIXTURES';
  }

  function render(mode, data) {
    setbadge(mode);
    let cards;
    if      (mode === 'live')   cards = (data.live     || []).map(buildLiveCard);
    else if (mode === 'recent') cards = (data.recent   || []).map(buildRecentCard);
    else                        cards = (data.upcoming || []).map(buildUpcomingCard);

    mainEl.innerHTML = cards.length
      ? cards.join('')
      : '<div class="fallback-wrap"><div class="fallback">🏆 FIFA World Cup 2026</div></div>';
  }

  function startCycle() {
    if (cycleTimer) clearInterval(cycleTimer);
    render(cycleState, currentData);
    cycleTimer = setInterval(() => {
      mainEl.classList.add('fading');
      setTimeout(() => {
        cycleState = cycleState === 'recent' ? 'upcoming' : 'recent';
        render(cycleState, currentData);
        mainEl.classList.remove('fading');
      }, 400);
    }, CYCLE_INTERVAL_MS);
  }

  function stopCycle() {
    if (cycleTimer) { clearInterval(cycleTimer); cycleTimer = null; }
  }

  function display(data) {
    const wasLive     = currentData?.live?.length > 0;
    currentData       = data;
    const hasLive     = data.live?.length > 0;
    const hasRecent   = data.recent?.length > 0;
    const hasUpcoming = data.upcoming?.length > 0;

    if (hasLive) {
      stopCycle(); render('live', data);
    } else if (hasRecent && hasUpcoming) {
      if (!cycleTimer || wasLive) { cycleState = 'upcoming'; startCycle(); }
    } else if (hasRecent)   { stopCycle(); render('recent', data);   }
    else if (hasUpcoming)   { stopCycle(); render('upcoming', data); }
    else {
      stopCycle(); setbadge('upcoming');
      mainEl.innerHTML = '<div class="fallback-wrap"><div class="fallback">🏆 FIFA World Cup 2026</div></div>';
    }
  }

  // ── Mock mode (?mock=live|recent|upcoming|both) ───────────────────
  const MOCK_MODE = new URLSearchParams(location.search).get('mock');
  const MOCK_DATA = {
    live: [
      { home: 'Switzerland', home_abbrev: 'SUI', away: 'Bosnia-Herzegovina', away_abbrev: 'BIH', home_score: 1, away_score: 0, status: 'IN_PLAY', minute: 67, group: 'Group F', venue_city: 'Kansas City, Missouri', utc_date: new Date().toISOString() },
      { home: 'Japan',       home_abbrev: 'JPN', away: 'Germany',            away_abbrev: 'GER', home_score: 2, away_score: 1, status: 'IN_PLAY', minute: 43, group: 'Group B', venue_city: 'Seattle, Washington',   utc_date: new Date().toISOString() },
    ],
    recent: [
      { home: 'Argentina',   home_abbrev: 'ARG', away: 'Canada',       away_abbrev: 'CAN', home_score: 2, away_score: 0, status: 'STATUS_FINAL', minute: null, group: 'Group A', venue_city: 'Dallas, Texas',           utc_date: new Date(Date.now() - 3  * 36e5).toISOString() },
      { home: 'France',      home_abbrev: 'FRA', away: 'Mexico',       away_abbrev: 'MEX', home_score: 1, away_score: 1, status: 'STATUS_FINAL', minute: null, group: 'Group D', venue_city: 'New York, New Jersey',    utc_date: new Date(Date.now() - 5  * 36e5).toISOString() },
      { home: 'Spain',       home_abbrev: 'ESP', away: 'Morocco',      away_abbrev: 'MAR', home_score: 3, away_score: 1, status: 'STATUS_FINAL', minute: null, group: 'Group E', venue_city: 'Miami, Florida',          utc_date: new Date(Date.now() - 7  * 36e5).toISOString() },
      { home: 'Germany',     home_abbrev: 'GER', away: 'Japan',        away_abbrev: 'JPN', home_score: 0, away_score: 1, status: 'STATUS_FINAL', minute: null, group: 'Group B', venue_city: 'Seattle, Washington',     utc_date: new Date(Date.now() - 22 * 36e5).toISOString() },
      { home: 'South Africa',home_abbrev: 'RSA', away: 'Mexico',       away_abbrev: 'MEX', home_score: 0, away_score: 2, status: 'STATUS_FINAL', minute: null, group: 'Group B', venue_city: 'Houston, Texas',          utc_date: new Date(Date.now() - 26 * 36e5).toISOString() },
      { home: 'Morocco',     home_abbrev: 'MAR', away: 'Brazil',       away_abbrev: 'BRA', home_score: 1, away_score: 1, status: 'STATUS_FINAL', minute: null, group: 'Group C', venue_city: 'Los Angeles, California', utc_date: new Date(Date.now() - 30 * 36e5).toISOString() },
    ],
    upcoming: [
      { home: 'Brazil',      home_abbrev: 'BRA', away: 'United States', away_abbrev: 'USA', home_score: 0, away_score: 0, status: 'STATUS_SCHEDULED', minute: null, group: 'Group C', venue_city: 'Los Angeles, California', utc_date: new Date(Date.now() + 2  * 36e5).toISOString() },
      { home: 'Portugal',    home_abbrev: 'POR', away: 'Uruguay',       away_abbrev: 'URU', home_score: 0, away_score: 0, status: 'STATUS_SCHEDULED', minute: null, group: 'Group H', venue_city: 'Kansas City, Missouri',  utc_date: new Date(Date.now() + 4  * 36e5).toISOString() },
      { home: 'Netherlands', home_abbrev: 'NED', away: 'Senegal',       away_abbrev: 'SEN', home_score: 0, away_score: 0, status: 'STATUS_SCHEDULED', minute: null, group: 'Group A', venue_city: 'Atlanta, Georgia',       utc_date: new Date(Date.now() + 6  * 36e5).toISOString() },
      { home: 'England',     home_abbrev: 'ENG', away: 'Nigeria',       away_abbrev: 'NGA', home_score: 0, away_score: 0, status: 'STATUS_SCHEDULED', minute: null, group: 'Group G', venue_city: 'Houston, Texas',         utc_date: new Date(Date.now() + 24 * 36e5).toISOString() },
    ],
  };

  let fetchTimer = null;

  async function fetchScores() {
    clearTimeout(fetchTimer);

    if (MOCK_MODE) {
      const d = { live: [], recent: [], upcoming: [] };
      if (MOCK_MODE === 'live')                             d.live     = MOCK_DATA.live;
      if (MOCK_MODE === 'recent'  || MOCK_MODE === 'both') d.recent   = MOCK_DATA.recent;
      if (MOCK_MODE === 'upcoming'|| MOCK_MODE === 'both') d.upcoming = MOCK_DATA.upcoming;
      display(d);
      fetchTimer = setTimeout(fetchScores, FETCH_INTERVAL_MS);
      return;
    }

    try {
      const res = await fetch(API_URL, { cache: 'no-store' });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      display(await res.json());
      fetchTimer = setTimeout(fetchScores, FETCH_INTERVAL_MS);
    } catch (e) {
      console.warn('[Fullscreen] fetch failed:', e.message);
      fetchTimer = setTimeout(fetchScores, 5_000);
    }
  }

  fetchScores();
</script>
