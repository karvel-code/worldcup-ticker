<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>World Cup 2026 Ticker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #ffffff;
      font-family: 'Helvetica Neue', Arial, sans-serif;
    }

    /* ── Outer bar ──────────────────────────────────────────────────── */
    #ticker-bar {
      display: flex;
      align-items: stretch;
      width: 100%;
      height: 100vh;
      background: #ffffff;
      overflow: hidden;
      position: relative;
      border-top: 4px solid #e8660e;
    }
    #ticker-bar.state-live     { border-top-color: #cc0000; }
    #ticker-bar.state-recent   { border-top-color: #e8660e; }
    #ticker-bar.state-upcoming { border-top-color: #e8660e; }

    /* Badge hidden — state is signalled by border-top colour */
    #badge { display: none; }

    /* ── Scroll area ────────────────────────────────────────────────── */
    .scroll-wrap {
      flex: 1;
      overflow: hidden;
      height: 100%;
      position: relative;
      transition: opacity 0.4s ease;
    }
    .scroll-wrap.fading { opacity: 0; }

    .scroll-track {
      display: flex;
      flex-direction: row;
      align-items: stretch;
      height: 100%;
    }

    /* ── Card pair: logo + match card ──────────────────────────────── */
    .card-pair {
      display: flex;
      flex-direction: row;
      align-items: center;
      height: 100%;
      padding: 0 14px;
      gap: 12px;
      flex-shrink: 0;
    }

    /* BetHooray logo — vw-based so it scales with signage screen width */
    .bh-logo-block {
      flex-shrink: 0;
      align-self: center;
      width: clamp(80px, 9vw, 140px);
      height: clamp(80px, 9vw, 140px);
      background-image: var(--bh-logo, none);
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
    }

    /* ── Match card (dark rounded box) ─────────────────────────────── */
    .match-card {
      display: flex;
      flex-direction: column;
      justify-content: center;
      flex-shrink: 0;
      background: #0f1c3a;
      border-radius: 10px;
      padding: clamp(6px, 1.2vh, 10px) clamp(14px, 2vw, 24px);
      gap: clamp(2px, 0.5vh, 5px);
      min-width: 210px;
      height: calc(100% - 14px);
      white-space: nowrap;
    }

    /* Row 1: city + time pill */
    .card-top {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .card-city {
      font-size: clamp(9px, 1.5vh, 12px);
      font-weight: 700;
      color: #8090b8;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      flex: 1;
    }
    .card-time-pill {
      font-size: clamp(9px, 1.5vh, 12px);
      font-weight: 700;
      color: #ffffff;
      background: #2a3a5c;
      border-radius: 4px;
      padding: 1px 7px;
      letter-spacing: 0.04em;
      flex-shrink: 0;
    }
    .card-time-live-pill {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: clamp(9px, 1.5vh, 12px);
      font-weight: 700;
      color: #ff5555;
      background: rgba(204,0,0,0.2);
      border-radius: 4px;
      padding: 1px 7px;
      letter-spacing: 0.04em;
      flex-shrink: 0;
    }
    .card-ft-pill {
      font-size: clamp(9px, 1.5vh, 12px);
      font-weight: 700;
      color: #a0aec0;
      background: #2a3a5c;
      border-radius: 4px;
      padding: 1px 7px;
      letter-spacing: 0.06em;
      flex-shrink: 0;
    }

    /* Live pulse dot */
    .live-dot {
      display: inline-block;
      width: clamp(6px, 1.3vh, 9px);
      height: clamp(6px, 1.3vh, 9px);
      border-radius: 50%;
      background: #cc0000;
      animation: pulse 1.2s ease-in-out infinite;
      flex-shrink: 0;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1;   transform: scale(1); }
      50%       { opacity: 0.3; transform: scale(0.6); }
    }

    /* Row 2: teams */
    .card-teams {
      display: flex;
      align-items: center;
      gap: clamp(4px, 0.8vh, 9px);
    }
    .team-block {
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .team-flag { font-size: clamp(16px, 3vh, 25px); line-height: 1; }
    .team-code {
      font-size: clamp(17px, 3.4vh, 28px);
      font-weight: 900;
      letter-spacing: 0.04em;
      color: #ffffff;
    }
    .card-vs {
      font-size: clamp(10px, 1.8vh, 14px);
      font-weight: 700;
      color: #3a4a6a;
      padding: 0 2px;
    }
    .card-score {
      font-size: clamp(18px, 3.6vh, 28px);
      font-weight: 900;
      letter-spacing: 0.08em;
      color: #ffffff;
    }

    /* Row 3: venue */
    .card-bottom { display: flex; align-items: center; }
    .card-venue {
      font-size: clamp(9px, 1.4vh, 11px);
      font-weight: 500;
      color: #5a6a8a;
      letter-spacing: 0.02em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 300px;
    }

    /* ── Full-width single live match scoreboard ────────────────────── */
    .live-full {
      display: flex;
      align-items: center;
      width: 100%;
      height: 100%;
      padding: 0 28px;
      gap: 0;
    }
    .live-full-home,
    .live-full-away {
      flex: 1;
      display: flex;
      align-items: center;
      gap: clamp(6px, 1.2vh, 12px);
    }
    .live-full-home { justify-content: flex-end; }
    .live-full-away { justify-content: flex-start; }
    .live-full-flag { font-size: clamp(22px, 4.5vh, 38px); line-height: 1; }
    .live-full-team {
      font-size: clamp(22px, 4.5vh, 38px);
      font-weight: 900;
      color: #0a1628;
      letter-spacing: 0.03em;
    }
    .live-full-center {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 clamp(16px, 3vh, 32px);
      gap: clamp(1px, 0.5vh, 4px);
    }
    .live-full-minute {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: clamp(11px, 2vh, 16px);
      font-weight: 800;
      color: #cc0000;
      letter-spacing: 0.04em;
    }
    .live-full-score {
      font-size: clamp(28px, 5.5vh, 46px);
      font-weight: 900;
      color: #0a1628;
      letter-spacing: 0.06em;
      line-height: 1;
    }
    .live-full-meta {
      font-size: clamp(9px, 1.5vh, 12px);
      font-weight: 600;
      color: #8090b8;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    /* Fallback */
    .fallback-card {
      display: flex;
      align-items: center;
      padding: 0 30px;
      font-size: clamp(13px, 3vh, 22px);
      font-weight: 700;
      color: #1a3a6a;
      letter-spacing: 0.06em;
      white-space: nowrap;
    }

    /* ── BetHooray sponsor overlay ──────────────────────────────────── */
    /* Covers the full ticker bar; slides up from below before each state */
    #sponsor-overlay {
      position: absolute;
      inset: 0;
      z-index: 30;
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      gap: clamp(10px, 2.5vw, 36px);
      background: #ffffff;
      border-top: 4px solid #e8660e;
      pointer-events: none;
      transform: translateY(105%);
    }
    #sponsor-overlay.sponsor-in {
      animation: sponsorSlideIn 0.45s cubic-bezier(0.22,1,0.36,1) forwards;
    }
    #sponsor-overlay.sponsor-out {
      animation: sponsorSlideOut 0.4s ease-in forwards;
    }
    @keyframes sponsorSlideIn {
      from { transform: translateY(105%); }
      to   { transform: translateY(0);    }
    }
    @keyframes sponsorSlideOut {
      from { transform: translateY(0);    }
      to   { transform: translateY(105%); }
    }
    .overlay-by {
      font-size: clamp(11px, 2vh, 16px);
      font-weight: 700;
      color: #a0a0a0;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .overlay-logo {
      height: clamp(34px, 70%, 64px);
      width: auto;
      display: block;
      flex-shrink: 0;
    }
    .overlay-url {
      font-size: clamp(13px, 2.4vh, 20px);
      font-weight: 900;
      color: #e8660e;
      letter-spacing: 0.02em;
      white-space: nowrap;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

<div id="ticker-bar" class="state-upcoming">
  <div id="badge" class="badge-upcoming">
    <span class="badge-icon">🏆</span>
    <span class="badge-label">FIFA WC 2026</span>
  </div>
  <div class="scroll-wrap" id="scroll-wrap">
    <div class="scroll-track" id="scroll-track">
      <div class="fallback-card">🏆 FIFA World Cup 2026</div>
    </div>
  </div>

  <!-- Overlay covers full ticker bar; slides in before each state change -->
  <div id="sponsor-overlay">
    <div class="overlay-by">Sponsored by</div>
    <img class="overlay-logo" src="bethooray-logo.png" alt="BetHooray">
    <div class="overlay-url">www.bethooray.com</div>
  </div>
</div>

<script>
  const API_URL = (location.hostname === '127.0.0.1' || location.hostname === 'localhost')
    ? 'http://localhost:3000/api/scores'
    : '/api/scores';

  const FETCH_INTERVAL_MS   = 20_000;
  const CYCLE_INTERVAL_MS   = 30_000;
  const SCROLL_SPEED_PX_S   = 40;
  const SPONSOR_SHOW_FOR_MS = 8_000;
  const EAT = 'Africa/Nairobi';

  let currentData = null;
  let cycleState  = 'upcoming';
  let cycleTimer  = null;

  const FLAGS = {
    'Argentina':    '🇦🇷', 'Australia':       '🇦🇺', 'Belgium':      '🇧🇪',
    'Brazil':       '🇧🇷', 'Cameroon':        '🇨🇲', 'Canada':       '🇨🇦',
    'Chile':        '🇨🇱', 'Colombia':        '🇨🇴', 'Costa Rica':   '🇨🇷',
    'Croatia':      '🇭🇷', 'Denmark':         '🇩🇰', 'Ecuador':      '🇪🇨',
    'Egypt':        '🇪🇬', 'England':         '🏴󠁧󠁢󠁥󠁮󠁧󠁿', 'France':       '🇫🇷',
    'Germany':      '🇩🇪', 'Ghana':           '🇬🇭', 'Honduras':     '🇭🇳',
    'Iran':         '🇮🇷', 'Japan':           '🇯🇵', 'Mexico':       '🇲🇽',
    'Morocco':      '🇲🇦', 'Netherlands':     '🇳🇱', 'New Zealand':  '🇳🇿',
    'Nigeria':      '🇳🇬', 'Panama':          '🇵🇦', 'Paraguay':     '🇵🇾',
    'Peru':         '🇵🇪', 'Poland':          '🇵🇱', 'Portugal':     '🇵🇹',
    'Qatar':        '🇶🇦', 'Saudi Arabia':    '🇸🇦', 'Senegal':      '🇸🇳',
    'Serbia':       '🇷🇸', 'South Korea':     '🇰🇷', 'Spain':        '🇪🇸',
    'Switzerland':  '🇨🇭', 'Tunisia':         '🇹🇳', 'United States':'🇺🇸',
    'Uruguay':      '🇺🇾', 'Wales':           '🏴󠁧󠁢󠁷󠁬󠁳󠁿', 'South Africa': '🇿🇦',
    'USA':          '🇺🇸', 'Korea Republic':  '🇰🇷', 'IR Iran':      '🇮🇷',
    'Czechia':      '🇨🇿', 'Czech Republic':  '🇨🇿', 'Scotland':     '🏴󠁧󠁢󠁳󠁣󠁴󠁿',
    "Côte d'Ivoire":'🇨🇮', 'Ivory Coast':     '🇨🇮', 'Slovenia':     '🇸🇮',
    'Slovakia':     '🇸🇰', 'Albania':         '🇦🇱', 'Romania':      '🇷🇴',
    'Austria':      '🇦🇹', 'Turkey':          '🇹🇷', 'Georgia':      '🇬🇪',
    'Ukraine':      '🇺🇦', 'Hungary':         '🇭🇺', 'Bolivia':      '🇧🇴',
    'Venezuela':    '🇻🇪', 'Guatemala':       '🇬🇹', 'El Salvador':  '🇸🇻',
    'Jamaica':      '🇯🇲', 'Indonesia':       '🇮🇩', 'Uzbekistan':   '🇺🇿',
    'Jordan':       '🇯🇴', 'Iraq':            '🇮🇶', 'Algeria':      '🇩🇿',
    'Mali':         '🇲🇱', 'Burkina Faso':    '🇧🇫', 'Congo DR':     '🇨🇩',
    'Tanzania':     '🇹🇿', 'Zambia':          '🇿🇲', 'Guinea':       '🇬🇳',
    'United States of America': '🇺🇸',
  };

  function flag(name) { return FLAGS[name] || ''; }

  function abbrev(m, side) {
    const ab   = side === 'home' ? m.home_abbrev : m.away_abbrev;
    const name = side === 'home' ? m.home        : m.away;
    return (ab && ab.length > 0) ? ab : name.slice(0, 3).toUpperCase();
  }

  // DOM
  const tickerBar   = document.getElementById('ticker-bar');
  const badgeEl     = document.getElementById('badge');
  const scrollWrap  = document.getElementById('scroll-wrap');
  const scrollTrack = document.getElementById('scroll-track');
  const overlay     = document.getElementById('sponsor-overlay');

  function setStateLive() {
    tickerBar.className = 'state-live';
    badgeEl.className   = 'badge-live';
    badgeEl.innerHTML   = `<span class="badge-icon"><span class="live-dot"></span></span><span class="badge-label">LIVE</span>`;
  }
  function setStateRecent() {
    tickerBar.className = 'state-recent';
    badgeEl.className   = 'badge-recent';
    badgeEl.innerHTML   = `<span class="badge-icon">🏆</span><span class="badge-label">WC 2026 RESULTS</span>`;
  }
  function setStateUpcoming() {
    tickerBar.className = 'state-upcoming';
    badgeEl.className   = 'badge-upcoming';
    badgeEl.innerHTML   = `<span class="badge-icon">🏆</span><span class="badge-label">FIFA WC 2026</span>`;
  }

  function matchTime(utcDate) {
    return new Date(utcDate).toLocaleTimeString([], {
      hour: '2-digit', minute: '2-digit', timeZone: EAT
    });
  }

  function matchDayLabel(utcDate) {
    const d   = new Date(utcDate);
    const now = new Date();
    const fmt = { timeZone: EAT, year: 'numeric', month: '2-digit', day: '2-digit' };
    const matchDay    = d.toLocaleDateString('en-CA', fmt);
    const todayDay    = now.toLocaleDateString('en-CA', fmt);
    const tomorrowDay = new Date(now.getTime() + 864e5).toLocaleDateString('en-CA', fmt);
    if (matchDay === todayDay)    return 'Today';
    if (matchDay === tomorrowDay) return 'Tomorrow';
    return d.toLocaleDateString([], { month: 'short', day: 'numeric', timeZone: EAT });
  }

  // ── Card builders ─────────────────────────────────────────────────
  // Logo is set via CSS variable --bh-logo to avoid duplicating the 47 KB
  // data URI in every repeated card element
  function buildBHLogo() {
    return `<div class="bh-logo-block"></div>`;
  }

  function buildLiveCard(m) {
    const minuteStr = m.status === 'PAUSED' ? 'HT' : (m.minute ? m.minute + "'" : 'LIVE');
    const city = m.venue_city || '';
    return `<div class="card-pair">${buildBHLogo()}<div class="match-card">
      <div class="card-top">
        <span class="card-city">${city}</span>
        <span class="card-time-live-pill"><span class="live-dot"></span>${minuteStr}</span>
      </div>
      <div class="card-teams">
        <div class="team-block"><span class="team-flag">${flag(m.home)}</span><span class="team-code">${abbrev(m,'home')}</span></div>
        <span class="card-score">${m.home_score ?? 0}–${m.away_score ?? 0}</span>
        <div class="team-block"><span class="team-code">${abbrev(m,'away')}</span><span class="team-flag">${flag(m.away)}</span></div>
      </div>
      <div class="card-bottom"><span class="card-venue">📍 ${city}</span></div>
    </div></div>`;
  }

  function buildRecentCard(m) {
    const city = m.venue_city || '';
    return `<div class="card-pair">${buildBHLogo()}<div class="match-card">
      <div class="card-top">
        <span class="card-city">${city}</span>
        <span class="card-ft-pill">FT</span>
      </div>
      <div class="card-teams">
        <div class="team-block"><span class="team-flag">${flag(m.home)}</span><span class="team-code">${abbrev(m,'home')}</span></div>
        <span class="card-score">${m.home_score ?? 0}–${m.away_score ?? 0}</span>
        <div class="team-block"><span class="team-code">${abbrev(m,'away')}</span><span class="team-flag">${flag(m.away)}</span></div>
      </div>
      <div class="card-bottom"><span class="card-venue">📍 ${city}</span></div>
    </div></div>`;
  }

  function buildUpcomingCard(m) {
    const timeStr = `${matchDayLabel(m.utc_date)} ${matchTime(m.utc_date)}`;
    const city = m.venue_city || '';
    return `<div class="card-pair">${buildBHLogo()}<div class="match-card">
      <div class="card-top">
        <span class="card-city">${city}</span>
        <span class="card-time-pill">${timeStr}</span>
      </div>
      <div class="card-teams">
        <div class="team-block"><span class="team-flag">${flag(m.home)}</span><span class="team-code">${abbrev(m,'home')}</span></div>
        <span class="card-vs">vs</span>
        <div class="team-block"><span class="team-code">${abbrev(m,'away')}</span><span class="team-flag">${flag(m.away)}</span></div>
      </div>
      <div class="card-bottom"><span class="card-venue">📍 ${city}</span></div>
    </div></div>`;
  }

  function buildFallback() {
    return '<div class="fallback-card">🏆 FIFA World Cup 2026</div>';
  }

  function buildLiveFullWidth(m) {
    const minuteStr = m.status === 'PAUSED' ? 'HT' : (m.minute ? m.minute + "'" : 'LIVE');
    const meta = [m.group, m.venue_city].filter(Boolean).join(' · ');
    return `<div class="live-full">
      <div class="live-full-home">
        <span class="live-full-flag">${flag(m.home)}</span>
        <span class="live-full-team">${abbrev(m, 'home')}</span>
      </div>
      <div class="live-full-center">
        <div class="live-full-minute"><span class="live-dot"></span>${minuteStr}</div>
        <div class="live-full-score">${m.home_score ?? 0} – ${m.away_score ?? 0}</div>
        ${meta ? `<div class="live-full-meta">${meta}</div>` : ''}
      </div>
      <div class="live-full-away">
        <span class="live-full-team">${abbrev(m, 'away')}</span>
        <span class="live-full-flag">${flag(m.away)}</span>
      </div>
    </div>`;
  }

  function buildContent(mode, data) {
    let cards;
    if      (mode === 'live')   cards = (data.live     || []).map(buildLiveCard);
    else if (mode === 'recent') cards = (data.recent   || []).map(buildRecentCard);
    else                        cards = (data.upcoming || []).map(buildUpcomingCard);

    if (!cards.length) return buildFallback();

    const single = cards.join('');
    return [single, single, single, single].join('');
  }

  // ── Scroll animation ──────────────────────────────────────────────
  let scrollAnimId    = null;
  let scrollStartTime = null;
  let scrollContentW  = 0;

  function startScroll() {
    cancelAnimationFrame(scrollAnimId);
    scrollStartTime = null;
    scrollContentW  = scrollTrack.scrollWidth / 4;

    function step(ts) {
      if (!scrollStartTime) scrollStartTime = ts;
      const x = ((ts - scrollStartTime) / 1000 * SCROLL_SPEED_PX_S) % scrollContentW;
      scrollTrack.style.transform = `translateX(-${x}px)`;
      scrollAnimId = requestAnimationFrame(step);
    }
    scrollAnimId = requestAnimationFrame(step);
  }

  function render(mode, data) {
    if      (mode === 'live')   setStateLive();
    else if (mode === 'recent') setStateRecent();
    else                        setStateUpcoming();

    if (mode === 'live' && (data.live || []).length <= 1) {
      cancelAnimationFrame(scrollAnimId);
      scrollTrack.style.transform = 'translateX(0)';
      const m = (data.live || [])[0];
      scrollTrack.innerHTML = m ? buildLiveFullWidth(m) : buildFallback();
      return;
    }

    scrollTrack.innerHTML = buildContent(mode, data);
    startScroll();
  }

  // ── Sponsor overlay ───────────────────────────────────────────────
  // Slides in before every state transition; content swaps while overlay visible
  function showSponsorThen(callback) {
    overlay.classList.remove('sponsor-out');
    overlay.classList.add('sponsor-in');

    // Swap content 1 s after overlay arrives (fully covering the ticker)
    setTimeout(() => { if (callback) callback(); }, 1000);

    // Slide overlay back out after SPONSOR_SHOW_FOR_MS
    setTimeout(() => {
      overlay.classList.remove('sponsor-in');
      overlay.classList.add('sponsor-out');
    }, SPONSOR_SHOW_FOR_MS);
  }

  // ── Cycling: recent ↔ upcoming, overlay shown between each ────────
  function startCycle() {
    if (cycleTimer) clearInterval(cycleTimer);
    render(cycleState, currentData);

    cycleTimer = setInterval(() => {
      const nextState = cycleState === 'recent' ? 'upcoming' : 'recent';
      showSponsorThen(() => {
        cycleState = nextState;
        render(cycleState, currentData);
      });
    }, CYCLE_INTERVAL_MS);
  }

  function stopCycle() {
    if (cycleTimer) { clearInterval(cycleTimer); cycleTimer = null; }
  }

  function display(data) {
    const wasLive = currentData?.live?.length > 0;
    currentData = data;
    const hasLive     = data.live?.length     > 0;
    const hasRecent   = data.recent?.length   > 0;
    const hasUpcoming = data.upcoming?.length > 0;

    if (hasLive) {
      stopCycle();
      if (!wasLive) {
        showSponsorThen(() => render('live', data));
      } else {
        render('live', data);
      }
    } else if (hasRecent && hasUpcoming) {
      if (!cycleTimer || wasLive) {
        if (wasLive) {
          showSponsorThen(() => { cycleState = 'upcoming'; startCycle(); });
        } else {

  function initLogo() {
    // CSS variable approach: one declaration, all .bh-logo-block elements share it
    document.documentElement.style.setProperty('--bh-logo', `url('${BH_LOGO}')`);
    // Overlay img
    document.querySelectorAll('[data-logo="bh"]').forEach(el => { el.src = BH_LOGO; });
  }

  // ── Bootstrap ─────────────────────────────────────────────────────
  async function fetchAndDisplay() {
    try {
      const res  = await fetch(API_URL, { cache: 'no-store' });
      const data = await res.json();
      display(data);
    } catch (e) {
      console.warn('Fetch failed', e);
    }
  }

  initLogo();

  if (MOCK_MODE) {
    let mockData = {};
    if      (MOCK_MODE === 'upcoming') mockData = { live: [], recent: [],               upcoming: MOCK_DATA.upcoming };
    else if (MOCK_MODE === 'recent')   mockData = { live: [], recent: MOCK_DATA.recent,  upcoming: [] };
    else if (MOCK_MODE === 'live1')    mockData = { live: [MOCK_DATA.live[0]], recent: [], upcoming: [] };
    else if (MOCK_MODE === 'live')     mockData = { live: MOCK_DATA.live, recent: [], upcoming: [] };
    else                               mockData = { live: [], recent: MOCK_DATA.recent,  upcoming: MOCK_DATA.upcoming };
    display(mockData);
  } else {
    fetchAndDisplay();
    setInterval(fetchAndDisplay, FETCH_INTERVAL_MS);
  }
