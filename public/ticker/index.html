<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>World Cup 2026 Ticker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #ffffff;
      font-family: 'Helvetica Neue', Arial, sans-serif;
    }

    /* в”Ђв”Ђ Outer bar в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ */
    #ticker-bar {
      display: flex;
      align-items: stretch;
      width: 100%;
      height: 100vh;
      background: #ffffff;
      color: #0a1628;
      overflow: hidden;
      border-top: 5px solid #cc0000;
    }
    #ticker-bar.state-live    { border-top-color: #cc0000; }
    #ticker-bar.state-recent  { border-top-color: #1a3a6a; }
    #ticker-bar.state-upcoming{ border-top-color: #cc0000; }

    /* в”Ђв”Ђ Left badge в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ */
    #badge {
      flex-shrink: 0;
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      padding: 0 22px;
      gap: 8px;
      border-right: 2px solid rgba(0,0,0,0.12);
      white-space: nowrap;
    }

    .badge-live     { background: #cc0000; }
    .badge-recent   { background: #1a3a6a; }
    .badge-upcoming { background: #1a3a6a; }

    .badge-icon  { font-size: clamp(20px, 3.8vh, 30px); line-height: 1; }
    .badge-label {
      font-size: clamp(13px, 2.2vh, 17px);
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #ffd700;
    }
    .badge-live .badge-label { color: #ffffff; }

    /* White dot inside the red live badge */
    .live-dot {
      display: inline-block;
      width: clamp(8px, 1.8vh, 13px);
      height: clamp(8px, 1.8vh, 13px);
      border-radius: 50%;
      background: #ffffff;
      animation: pulse 1.2s ease-in-out infinite;
    }
    /* Red dot when used inside a card (white background) */
    .card-time-live .live-dot { background: #cc0000; }

    @keyframes pulse {
      0%, 100% { opacity: 1;   transform: scale(1); }
      50%       { opacity: 0.3; transform: scale(0.6); }
    }

    /* в”Ђв”Ђ Scroll area в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ */
    .scroll-wrap {
      flex: 1;
      overflow: hidden;
      height: 100%;
      transition: opacity 0.4s ease;
    }
    .scroll-wrap.fading { opacity: 0; }

    .scroll-track {
      display: flex;
      flex-direction: row;
      align-items: stretch;
      height: 100%;
    }

    /* в”Ђв”Ђ Match card в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ */
    .match-card {
      display: flex;
      flex-direction: column;
      justify-content: center;
      flex-shrink: 0;
      padding: 0 20px;
      gap: clamp(1px, 0.7vh, 5px);
      border-right: 1px solid rgba(0,0,0,0.1);
      white-space: nowrap;
    }

    /* Row 1: time / minute + venue */
    .card-top {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .card-time {
      font-size: clamp(13px, 2.2vh, 18px);
      font-weight: 800;
      color: #1a3a6a;
      letter-spacing: 0.03em;
    }
    .card-time-live {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: clamp(13px, 2.2vh, 18px);
      font-weight: 800;
      color: #cc0000;
      letter-spacing: 0.03em;
    }
    .card-ft {
      font-size: clamp(11px, 1.9vh, 15px);
      font-weight: 800;
      color: #1a3a6a;
      letter-spacing: 0.06em;
    }
    .card-venue {
      font-size: clamp(10px, 1.6vh, 13px);
      font-weight: 500;
      color: #6878a0;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* Row 2: teams */
    .card-teams {
      display: flex;
      align-items: center;
      gap: clamp(5px, 1vh, 10px);
    }
    .team-block {
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .team-flag { font-size: clamp(16px, 3.2vh, 26px); line-height: 1; }
    .team-code {
      font-size: clamp(17px, 3.4vh, 28px);
      font-weight: 900;
      letter-spacing: 0.04em;
      color: #0a1628;
    }
    .card-vs {
      font-size: clamp(12px, 2vh, 16px);
      font-weight: 800;
      color: #a0aec0;
    }
    .card-score {
      font-size: clamp(18px, 3.6vh, 28px);
      font-weight: 900;
      letter-spacing: 0.08em;
      color: #0a1628;
    }

    /* Row 3: group label */
    .card-bottom { display: flex; align-items: center; }
    .card-group {
      font-size: clamp(9px, 1.5vh, 12px);
      font-weight: 700;
      color: #8090b8;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* Thin gap divider between card sets */
    .card-divider {
      flex-shrink: 0;
      align-self: center;
      width: 1px;
      height: 60%;
      background: rgba(0,0,0,0.12);
    }

    /* Fallback */
    .fallback-card {
      display: flex;
      align-items: center;
      padding: 0 30px;
      font-size: clamp(13px, 3vh, 22px);
      font-weight: 700;
      color: #1a3a6a;
      letter-spacing: 0.06em;
      white-space: nowrap;
    }
  </style>
</head>
<body>

<div id="ticker-bar" class="state-upcoming" style="background:#ffffff">
  <div id="badge" class="badge-upcoming">
    <span class="badge-icon">рџЏ†</span>
    <span class="badge-label">FIFA WC 2026</span>
  </div>
  <div class="scroll-wrap" id="scroll-wrap">
    <div class="scroll-track" id="scroll-track">
      <div class="fallback-card">рџЏ† FIFA World Cup 2026</div>
    </div>
  </div>
</div>

<script>
  const API_URL = (location.hostname === '127.0.0.1' || location.hostname === 'localhost')
    ? 'http://localhost:3000/api/scores'
    : '/api/scores';

  const FETCH_INTERVAL_MS = 20_000;
  const CYCLE_INTERVAL_MS = 30_000;
  const SCROLL_SPEED_PX_S = 40;
  const EAT = 'Africa/Nairobi';

  let currentData = null;
  let cycleState  = 'recent';
  let cycleTimer  = null;

  const FLAGS = {
    'Argentina':    'рџ‡¦рџ‡·', 'Australia':       'рџ‡¦рџ‡є', 'Belgium':      'рџ‡§рџ‡Є',
    'Brazil':       'рџ‡§рџ‡·', 'Cameroon':        'рџ‡Ёрџ‡І', 'Canada':       'рџ‡Ёрџ‡¦',
    'Chile':        'рџ‡Ёрџ‡±', 'Colombia':        'рџ‡Ёрџ‡ґ', 'Costa Rica':   'рџ‡Ёрџ‡·',
    'Croatia':      'рџ‡­рџ‡·', 'Denmark':         'рџ‡©рџ‡°', 'Ecuador':      'рџ‡Єрџ‡Ё',
    'Egypt':        'рџ‡Єрџ‡¬', 'England':         'рџЏґу Ѓ§у Ѓўу ЃҐу Ѓ®у Ѓ§у Ѓї', 'France':       'рџ‡«рџ‡·',
    'Germany':      'рџ‡©рџ‡Є', 'Ghana':           'рџ‡¬рџ‡­', 'Honduras':     'рџ‡­рџ‡і',
    'Iran':         'рџ‡®рџ‡·', 'Japan':           'рџ‡Їрџ‡µ', 'Mexico':       'рџ‡Ірџ‡Ѕ',
    'Morocco':      'рџ‡Ірџ‡¦', 'Netherlands':     'рџ‡ірџ‡±', 'New Zealand':  'рџ‡ірџ‡ї',
    'Nigeria':      'рџ‡ірџ‡¬', 'Panama':          'рџ‡µрџ‡¦', 'Paraguay':     'рџ‡µрџ‡ѕ',
    'Peru':         'рџ‡µрџ‡Є', 'Poland':          'рџ‡µрџ‡±', 'Portugal':     'рџ‡µрџ‡№',
    'Qatar':        'рџ‡¶рџ‡¦', 'Saudi Arabia':    'рџ‡ёрџ‡¦', 'Senegal':      'рџ‡ёрџ‡і',
    'Serbia':       'рџ‡·рџ‡ё', 'South Korea':     'рџ‡°рџ‡·', 'Spain':        'рџ‡Єрџ‡ё',
    'Switzerland':  'рџ‡Ёрџ‡­', 'Tunisia':         'рџ‡№рџ‡і', 'United States':'рџ‡єрџ‡ё',
    'Uruguay':      'рџ‡єрџ‡ѕ', 'Wales':           'рџЏґу Ѓ§у Ѓўу Ѓ·у Ѓ¬у Ѓіу Ѓї', 'South Africa': 'рџ‡їрџ‡¦',
    'USA':          'рџ‡єрџ‡ё', 'Korea Republic':  'рџ‡°рџ‡·', 'IR Iran':      'рџ‡®рџ‡·',
    'Czechia':      'рџ‡Ёрџ‡ї', 'Czech Republic':  'рџ‡Ёрџ‡ї', 'Scotland':     'рџЏґу Ѓ§у Ѓўу Ѓіу ЃЈу Ѓґу Ѓї',
    "CГґte d'Ivoire":'рџ‡Ёрџ‡®', 'Ivory Coast':     'рџ‡Ёрџ‡®', 'Slovenia':     'рџ‡ёрџ‡®',
    'Slovakia':     'рџ‡ёрџ‡°', 'Albania':         'рџ‡¦рџ‡±', 'Romania':      'рџ‡·рџ‡ґ',
    'Austria':      'рџ‡¦рџ‡№', 'Turkey':          'рџ‡№рџ‡·', 'Georgia':      'рџ‡¬рџ‡Є',
    'Ukraine':      'рџ‡єрџ‡¦', 'Hungary':         'рџ‡­рџ‡є', 'Bolivia':      'рџ‡§рџ‡ґ',
    'Venezuela':    'рџ‡»рџ‡Є', 'Guatemala':       'рџ‡¬рџ‡№', 'El Salvador':  'рџ‡ёрџ‡»',
    'Jamaica':      'рџ‡Їрџ‡І', 'Indonesia':       'рџ‡®рџ‡©', 'Uzbekistan':   'рџ‡єрџ‡ї',
    'Jordan':       'рџ‡Їрџ‡ґ', 'Iraq':            'рџ‡®рџ‡¶', 'Algeria':      'рџ‡©рџ‡ї',
    'Mali':         'рџ‡Ірџ‡±', 'Burkina Faso':    'рџ‡§рџ‡«', 'Congo DR':     'рџ‡Ёрџ‡©',
    'Tanzania':     'рџ‡№рџ‡ї', 'Zambia':          'рџ‡їрџ‡І', 'Guinea':       'рџ‡¬рџ‡і',
    'United States of America': 'рџ‡єрџ‡ё',
  };

  function flag(name) { return FLAGS[name] || ''; }

  function abbrev(m, side) {
    const ab   = side === 'home' ? m.home_abbrev : m.away_abbrev;
    const name = side === 'home' ? m.home        : m.away;
    return (ab && ab.length > 0) ? ab : name.slice(0, 3).toUpperCase();
  }

  // DOM
  const tickerBar  = document.getElementById('ticker-bar');
  const badgeEl    = document.getElementById('badge');
  const scrollWrap = document.getElementById('scroll-wrap');
  const scrollTrack= document.getElementById('scroll-track');

  function setStateLive() {
    tickerBar.className = 'state-live';
    badgeEl.className   = 'badge-live';
    badgeEl.innerHTML   = `<span class="badge-icon"><span class="live-dot"></span></span><span class="badge-label">LIVE</span>`;
  }
  function setStateRecent() {
    tickerBar.className = 'state-recent';
    badgeEl.className   = 'badge-recent';
    badgeEl.innerHTML   = `<span class="badge-icon">рџЏ†</span><span class="badge-label">WC 2026 RESULTS</span>`;
  }
  function setStateUpcoming() {
    tickerBar.className = 'state-upcoming';
    badgeEl.className   = 'badge-upcoming';
    badgeEl.innerHTML   = `<span class="badge-icon">рџЏ†</span><span class="badge-label">FIFA WC 2026</span>`;
  }

  function matchTime(utcDate) {
    return new Date(utcDate).toLocaleTimeString([], {
      hour: '2-digit', minute: '2-digit', timeZone: EAT
    });
  }

  function matchDayLabel(utcDate) {
    const d   = new Date(utcDate);
    const now = new Date();
    const fmt = { timeZone: EAT, year: 'numeric', month: '2-digit', day: '2-digit' };
    const matchDay    = d.toLocaleDateString('en-CA', fmt);
    const todayDay    = now.toLocaleDateString('en-CA', fmt);
    const tomorrowDay = new Date(now.getTime() + 864e5).toLocaleDateString('en-CA', fmt);
    if (matchDay === todayDay)    return 'Today';
    if (matchDay === tomorrowDay) return 'Tomorrow';
    return d.toLocaleDateString([], { month: 'short', day: 'numeric', timeZone: EAT });
  }

  function venueHtml(m) {
    return m.venue_city ? `<span class="card-venue">${m.venue_city}</span>` : '';
  }

  function groupHtml(m) {
    const wc = 'FIFA WORLD CUP 2026';
    return `<span class="card-group">${m.group ? m.group + ' В· ' : ''}${wc}</span>`;
  }

  function buildLiveCard(m) {
    const minuteStr = m.status === 'PAUSED' ? 'HT' : (m.minute ? m.minute + "'" : 'LIVE');
    return `<div class="match-card">
      <div class="card-top">
        <span class="card-time-live"><span class="live-dot"></span>${minuteStr}</span>
        ${venueHtml(m)}
      </div>
      <div class="card-teams">
        <div class="team-block">
          <span class="team-flag">${flag(m.home)}</span>
          <span class="team-code">${abbrev(m,'home')}</span>
        </div>
        <span class="card-score">${m.home_score ?? 0}вЂ“${m.away_score ?? 0}</span>
        <div class="team-block">
          <span class="team-code">${abbrev(m,'away')}</span>
          <span class="team-flag">${flag(m.away)}</span>
        </div>
      </div>
      <div class="card-bottom">${groupHtml(m)}</div>
    </div>`;
  }

  function buildRecentCard(m) {
    return `<div class="match-card">
      <div class="card-top">
        <span class="card-ft">FT</span>
        ${venueHtml(m)}
      </div>
      <div class="card-teams">
        <div class="team-block">
          <span class="team-flag">${flag(m.home)}</span>
          <span class="team-code">${abbrev(m,'home')}</span>
        </div>
        <span class="card-score">${m.home_score ?? 0}вЂ“${m.away_score ?? 0}</span>
        <div class="team-block">
          <span class="team-code">${abbrev(m,'away')}</span>
          <span class="team-flag">${flag(m.away)}</span>
        </div>
      </div>
      <div class="card-bottom">${groupHtml(m)}</div>
    </div>`;
  }

  function buildUpcomingCard(m) {
    const timeLabel = `${matchDayLabel(m.utc_date)} ${matchTime(m.utc_date)}`;
    return `<div class="match-card">
      <div class="card-top">
        <span class="card-time">${timeLabel}</span>
        ${venueHtml(m)}
      </div>
      <div class="card-teams">
        <div class="team-block">
          <span class="team-flag">${flag(m.home)}</span>
          <span class="team-code">${abbrev(m,'home')}</span>
        </div>
        <span class="card-vs">VS</span>
        <div class="team-block">
          <span class="team-code">${abbrev(m,'away')}</span>
          <span class="team-flag">${flag(m.away)}</span>
        </div>
      </div>
      <div class="card-bottom">${groupHtml(m)}</div>
    </div>`;
  }

  function buildDivider() { return '<div class="card-divider"></div>'; }

  function buildFallback() {
    return '<div class="fallback-card">рџЏ† FIFA World Cup 2026</div>';
  }

  function buildContent(mode, data) {
    let cards;
    if      (mode === 'live')   cards = (data.live     || []).map(buildLiveCard);
    else if (mode === 'recent') cards = (data.recent   || []).map(buildRecentCard);
    else                        cards = (data.upcoming || []).map(buildUpcomingCard);

    if (!cards.length) return buildFallback();

    const single = cards.join(buildDivider());
    return [single, single, single, single].join(buildDivider());
  }

  // в”Ђв”Ђ Scroll animation в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  let scrollAnimId    = null;
  let scrollStartTime = null;
  let scrollContentW  = 0;

  function startScroll() {
    cancelAnimationFrame(scrollAnimId);
    scrollStartTime = null;
    scrollContentW  = scrollTrack.scrollWidth / 4;

    function step(ts) {
      if (!scrollStartTime) scrollStartTime = ts;
      const x = ((ts - scrollStartTime) / 1000 * SCROLL_SPEED_PX_S) % scrollContentW;
      scrollTrack.style.transform = `translateX(-${x}px)`;
      scrollAnimId = requestAnimationFrame(step);
    }
    scrollAnimId = requestAnimationFrame(step);
  }

  function render(mode, data) {
    if      (mode === 'live')   setStateLive();
    else if (mode === 'recent') setStateRecent();
    else                        setStateUpcoming();

    scrollTrack.innerHTML = buildContent(mode, data);
    startScroll();
  }

  function startCycle() {
    if (cycleTimer) clearInterval(cycleTimer);
    render(cycleState, currentData);
    cycleTimer = setInterval(() => {
      scrollWrap.classList.add('fading');
      setTimeout(() => {
        cycleState = cycleState === 'recent' ? 'upcoming' : 'recent';
        render(cycleState, currentData);  // always use latest data
        scrollWrap.classList.remove('fading');
      }, 400);
    }, CYCLE_INTERVAL_MS);
  }

  function stopCycle() {
    if (cycleTimer) { clearInterval(cycleTimer); cycleTimer = null; }
  }

  function display(data) {
    const wasLive = currentData?.live?.length > 0;
    currentData = data;
    const hasLive     = data.live?.length     > 0;
    const hasRecent   = data.recent?.length   > 0;
    const hasUpcoming = data.upcoming?.length > 0;

    if (hasLive) {
      stopCycle(); render('live', data);
    } else if (hasRecent && hasUpcoming) {
      if (!cycleTimer || wasLive) {
        // Start fresh only on first load or when transitioning out of live
        cycleState = 'upcoming';
        startCycle();
      }
      // Otherwise let the existing cycle continue uninterrupted
    } else if (hasRecent) {
      stopCycle(); render('recent', data);
    } else if (hasUpcoming) {
      stopCycle(); render('upcoming', data);
    } else {
      stopCycle();
      setStateUpcoming();
      scrollTrack.innerHTML = buildFallback();
      cancelAnimationFrame(scrollAnimId);
    }
  }

  // в”Ђв”Ђ Fetch loop в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  let fetchTimer = null;

  async function fetchScores() {
    clearTimeout(fetchTimer);
    try {
      const res = await fetch(API_URL, { cache: 'no-store' });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      display(data);
      fetchTimer = setTimeout(fetchScores, FETCH_INTERVAL_MS);
    } catch (e) {
      console.warn('[Ticker] fetch failed:', e.message);
      fetchTimer = setTimeout(fetchScores, 5_000);
    }
  }

  fetchScores();
</script>
</body>
